{% extends "base.html" %}

{% block title %}Character Slider | Solo Leveling{% endblock %}

{% block content %}
<div class="container mt-5">
  <h2 class="text-center mb-4">Select a Character</h2>
  
  <div class="d-flex justify-content-center align-items-center">
    <button class="btn btn-outline-primary me-3" onclick="prevCharacter()">&#10094;</button>

    <div class="card text-center shadow-lg" style="max-width: 400px; min-width: 300px;">
      <img id="char-img" src="https://via.placeholder.com/400x250" class="card-img-top" alt="Character Image">
      <div class="card-body">
        <h5 class="card-title" id="char-name">Name</h5>
        <h6 class="card-subtitle mb-2 text-muted" id="char-korean">(한글이름)</h6>
        <p class="card-text" id="char-title">Title</p>
        <p class="card-text" id="char-desc">Description</p>
        <span class="badge bg-dark" id="char-theme">Theme</span>
      </div>
    </div>

    <button class="btn btn-outline-primary ms-3" onclick="nextCharacter()">&#10095;</button>
  </div>
</div>
{% endblock %}

{% block script %}
<script>
const dataUrl = "{{ url_for('static', filename='data/characters.json') }}";
fetch(dataUrl)
  .then(response => response.json())
  .then(data => {
    // TODO: Use the character data to update the UI
    console.log(data);
  })
  .catch(error => {
    console.error('Error fetching character data:', error);
  });
</script>
{% endblock %}
