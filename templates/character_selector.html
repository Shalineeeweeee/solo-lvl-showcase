{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/selector.css') }}">

<div class="selector-container">
  <h2>Select a Character</h2>
  <div class="slider-wrapper hidden" id="sliderWrapper">
    <button id="prevBtn" class="nav-arrow">&#10094;</button>
    <div class="card-slider" id="cardSlider"></div>
    <button id="nextBtn" class="nav-arrow">&#10095;</button>
  </div>
</div>

<script>
(function () {
  const savedTheme = localStorage.getItem('selectedTheme') || 'jinwoo';
  document.body.classList.add(`theme-${savedTheme}`);
})();

let characterData = {};
let characterKeys = [];
let currentIndex = 0;

fetch("/static/data/characters.json")
  .then(res => res.json())
  .then(data => {
    characterData = data;
    characterKeys = Object.keys(data);
    loadCards();

    const savedKey = localStorage.getItem("selectedCharacterKey");
    const savedIndex = characterKeys.indexOf(savedKey);
    highlightCard(savedIndex >= 0 ? savedIndex : 0);

    document.getElementById("sliderWrapper").classList.remove("hidden");
  });

function loadCards() {
  const slider = document.getElementById("cardSlider");
  slider.innerHTML = "";

  characterKeys.forEach((key, index) => {
    const char = characterData[key];
    const card = document.createElement("div");
    card.className = "character-card";
    card.innerHTML = `
      <img src="${char.image}" alt="${char.name}" />
      <h3>${char.name} <span style="font-size: 0.9rem;">${char.korean}</span></h3>
      <p><strong>${char.title}</strong></p>
      <div class="card-description">
        <p>${char.description}</p>
        <p><em>Theme: ${char.theme}</em></p>
      </div>
    `;
    card.addEventListener("click", () => {
      document.querySelectorAll(".character-card").forEach(c => c.classList.remove("expanded"));
      card.classList.add("expanded");
      currentIndex = index;
      localStorage.setItem("selectedCharacterKey", key);
      fetch(`/set-character?key=${key}`).catch(() => {});
      card.scrollIntoView({ behavior: "smooth", inline: "center" });
    });
    slider.appendChild(card);
  });
}

function highlightCard(index) {
  const cards = document.querySelectorAll(".character-card");
  if (cards[index]) {
    cards.forEach(c => c.classList.remove("expanded"));
    cards[index].classList.add("expanded");

    const cardWidth = cards[index].offsetWidth + 32;
    const slider = document.getElementById("cardSlider");
    const scrollPosition = cardWidth * index - (slider.offsetWidth / 2) + (cardWidth / 2);

    slider.scrollTo({ left: scrollPosition, behavior: "smooth" });
    currentIndex = index;
  }
}

document.getElementById("nextBtn").addEventListener("click", () => {
  if (currentIndex < characterKeys.length - 1) {
    currentIndex++;
    highlightCard(currentIndex);
  }
});

document.getElementById("prevBtn").addEventListener("click", () => {
  if (currentIndex > 0) {
    currentIndex--;
    highlightCard(currentIndex);
  }
});
</script>
{% endblock %}
