{% extends "base.html" %}
{% block title %}Select a Character | Solo Leveling{% endblock %}

{% block content %}
<div class="character-hero">

  <!-- LEFT TEXT -->
  <div class="selector-info">
    <h1 id="charselect-name"></h1>
    <h4 id="charselect-korean"></h4>
    <h5 id="charselect-title"></h5>
    <p id="charselect-desc"></p>
  </div>

  <!-- RIGHT IMAGE -->
  <div class="character-visual">
    <img id="char-img" src="" alt="Character portrait">
  </div>

  <!-- ARROWS -->
  <button class="nav-btn left" onclick="prevCharacter()">‹</button>
  <button class="nav-btn right" onclick="nextCharacter()">›</button>

</div>
{% endblock %}

{% block script %}
<script>
  const characters = JSON.parse('{{ characters | tojson | safe }}');
  const keys = Object.keys(characters);
  let currentIndex = keys.indexOf("sung-jin-woo");
  if (currentIndex === -1) currentIndex = 0;

  function updateSlider() {
    const key = keys[currentIndex];
    const char = characters[key];

    document.getElementById('char-img').src = char.image;
    document.getElementById('charselect-name').textContent = char.name;
    document.getElementById('charselect-korean').textContent = char.korean || "";
    document.getElementById('charselect-title').textContent = char.title;
    document.getElementById('charselect-desc').textContent = char.description;
  }

  function prevCharacter() {
    currentIndex = (currentIndex - 1 + keys.length) % keys.length;
    updateSlider();
  }

  function nextCharacter() {
    currentIndex = (currentIndex + 1) % keys.length;
    updateSlider();
  }

 function updateSlider() {
  const info = document.querySelector(".selector-info");
  const img = document.getElementById("char-img");

  // fade out
  info.classList.add("fade-out");
  img.classList.add("fade-out");

  setTimeout(() => {
    const key = keys[currentIndex];
    const char = characters[key];

    // update content
    img.src = char.image;
    document.getElementById('charselect-name').textContent = char.name;
    document.getElementById('charselect-korean').textContent = char.korean || "";
    document.getElementById('charselect-title').textContent = char.title;
    document.getElementById('charselect-desc').textContent = char.description || "";

    // fade back in
    info.classList.remove("fade-out");
    img.classList.remove("fade-out");

    info.classList.add("fade-in");
    img.classList.add("fade-in");

    setTimeout(() => {
      info.classList.remove("fade-in");
      img.classList.remove("fade-in");
    }, 250);

  }, 180);
}
</script>
{% endblock %}
