{% extends "base.html" %}
{% block title %}Select a Character | Solo Leveling{% endblock %}

{% block content %}
<div class="slider-wrapper">
    <h2 class="text-center">Select a Character</h2>
    <div class="character-slider">
        {% for key, character in characters.items() %}
        <div class="character-card" onclick="showCharacter('{{ key }}')">
            <img src="{{ url_for('static', filename=character.image.lstrip('/static/')) }}" alt="{{ character.name }}">
            <h3>{{ character.name }}</h3>
        </div>
        {% endfor %}
    </div>

    <div id="character-details" class="character-details hidden">
        <h2 id="char-name"></h2>
        <p id="char-korean" class="korean-name"></p>
        <p id="char-title"></p>
        <p id="char-description"></p>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
    const charactersData = {{ characters | tojson | safe }};
    
    function showCharacter(key) {
        const char = charactersData[key];
        if (char) {
            document.getElementById('character-details').classList.remove('hidden');
            document.getElementById('char-name').textContent = char.name;
            document.getElementById('char-korean').textContent = char.korean;
            document.getElementById('char-title').textContent = char.title;
            document.getElementById('char-description').textContent = char.description;
        }
    }
</script>
{% endblock %}
