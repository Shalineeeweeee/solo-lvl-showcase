<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Solo Leveling Showcase{% endblock %}</title>

  <!-- 🪄 Apply theme IMMEDIATELY to <html> before anything renders -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('selectedTheme') || 'jinwoo';
      document.documentElement.className = `theme-${savedTheme}`;
    })();
  </script>

  <!-- ✅ Now load CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>

<body>
  <!-- ✅ Background Overlay -->
  <div id="character-background-overlay"></div>

  {% if not hide_nav %}
  <header id="main-header">
    <nav id="main-nav">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Solo Leveling Logo" class="logo" />
      <ul>
        <li><a href="/" class="nav-item">Home</a></li>
        <li><a href="/character" class="nav-item">Characters</a></li>
        <li><a href="/about" class="nav-item">Help</a></li>
      </ul>

      {% if user %}
      <div class="profile-dropdown">
        <img src="{{ url_for('static', filename='img/profile.png') }}" alt="Profile" class="profile-icon" onclick="toggleProfileMenu()" />
        <div id="profile-menu" class="dropdown-menu">
          <a href="/profile">View Profile</a>
          <a href="/logout">Log Out</a>
        </div>
      </div>
      {% else %}
      <a href="/signup" id="sign">Sign Up</a>
      {% endif %}

      <div class="search-container">
        <button type="submit" class="search-button" title="Search">
          <i class="fas fa-search"></i>
        </button>
        <input type="text" placeholder="Search..." class="search-input" />
      </div>
    </nav>
  </header>
  {% endif %}

  <!-- ✅ Main Content -->
  <div id="app-container">
    {% block content %}{% endblock %}
  </div>

  <!-- ✅ Set background overlay from computed theme -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const overlay = document.getElementById("character-background-overlay");
      const styles = getComputedStyle(document.documentElement);
      overlay.style.background = styles.getPropertyValue("--bg-color-dark");

      // Save session theme for backend
      const theme = localStorage.getItem('selectedTheme') || 'jinwoo';
      fetch(`/set-theme?theme=${theme}`);
    });
  </script>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
