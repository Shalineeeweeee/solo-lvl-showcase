{% extends "base.html" %}

{% block title %}Select Character | Solo Leveling{% endblock %}


{% block content %}
<main id="character-selector-page" class="character-selector-page">
  <h1 class="character-selector-title">Select a Character</h1>
  <div id="character-selector-grid" class="character-selector-grid">
    {% for key, data in character_data.items() %}
    <div class="character-card" data-key="{{ key }}">
      <img src="{{ url_for('static', filename=data.image) }}" alt="{{ data.name }}" class="character-image">
      <h3 class="character-name">{{ data.name }}</h3>
      <p>{{ data.title }}</p>
      <a href="/character/{{ key }}" class="view-button">View</a>
      <a href="/character/{{ key }}" class="view-button view-button-accent">View</a>
    </div>
    {% endfor %}
  </div>
</main>
return render_template('index.html')
{% endblock %}
